spring:
  application:
    name: project_tb001
  profiles:
    active: postgres
#    active: h2

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false

server:
  port: 8080

app:
  kafka:
    order-created-topic: ${KAFKA_ORDER_CREATED_TOPIC:order-created}
