services:
  postgres:
    image: postgres:16
    container_name: tb001_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tb001}
      POSTGRES_USER: ${POSTGRES_USER:-tb001}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - tb001_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tb001} -d ${POSTGRES_DB:-tb001}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tb001_pgdata:
